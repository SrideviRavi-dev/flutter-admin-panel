name: admin
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.6.0
dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # Utility Packages
  intl: ^0.20.1
  lottie: ^3.3.1
  shimmer: ^3.0.0 
  clipboard: ^0.1.3
  image_picker: ^1.1.2
  flutter_typeahead: ^5.2.0
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.2
  multi_select_flutter: ^4.1.3
  cached_network_image: ^3.4.1
  flutter_native_splash: ^2.4.4
  smooth_page_indicator: ^1.2.0+3
  flutter_dropzone: ^4.2.1
 
 
  # Web Specific
  web: ^1.1.0
  http: ^1.3.0
  fl_chart: ^0.70.2
  data_table_2: ^2.5.18
  universal_html: ^2.2.4
  

  # State Management
  get: ^4.6.6
  get_storage: ^2.1.1

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2
  firebase_storage: ^12.4.1
  iconsax: ^0.0.8
  flutter_dropzone_web: ^4.2.0
  flutter_dropzone_platform_interface: ^2.2.0
  pdf: ^3.11.3
  printing: ^5.14.2
  qr_flutter: ^4.1.0
 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
flutter:
